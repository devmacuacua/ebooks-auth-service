server:
  port: ${PORT:8081}

spring:
  application:
    name: ebooks-auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:ebooks}
    password: ${SPRING_DATASOURCE_PASSWORD:ebooks_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    username: ${SPRING_RABBITMQ_USERNAME:ebooks}
    password: ${SPRING_RABBITMQ_PASSWORD:ebooks_secret}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: [openid, profile, email]
            redirect-uri: "{baseUrl}/auth/oauth2/callback/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_APP_ID:}
            client-secret: ${FACEBOOK_APP_SECRET:}
            scope: [email, public_profile]
            redirect-uri: "{baseUrl}/auth/oauth2/callback/{registrationId}"
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme_at_least_32_chars_long_!}
    access-token-expiry-ms: 900000      # 15 min
    refresh-token-expiry-ms: 604800000  # 7 days
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  smtp-from: ${SMTP_FROM:noreply@ebooks.co.mz}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
